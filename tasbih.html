<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasbih Counter | UmmahVerse</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="logo.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#064E3B">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="i18n.js"></script>
    <style>
        .tasbih-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .counter-circle {
            width: 300px;
            height: 300px;
            border: 8px solid var(--gold-primary);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            user-select: none;
            transition: all 0.1s ease;
            position: relative;
            background: rgba(255, 255, 255, 0.02);
        }

        .counter-circle:active {
            transform: scale(0.95);
            background: rgba(212, 175, 55, 0.1);
        }

        .count-val {
            font-size: 100px;
            font-weight: 800;
        }

        .goal-indicator {
            position: absolute;
            bottom: -50px;
            color: var(--text-muted);
        }

        .reset-btn {
            margin-top: 80px;
            background: none;
            border: 1px solid var(--text-muted);
            color: var(--text-muted);
            padding: 10px 30px;
            border-radius: 50px;
            cursor: pointer;
        }

        .reset-btn:hover {
            color: var(--gold-primary);
            border-color: var(--gold-primary);
        }
        
        .dhikr-text {
            font-size: 24px;
            margin-bottom: 40px;
            color: var(--gold-primary);
            font-family: 'Amiri', serif;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="pattern-overlay"></div>

    <div class="tasbih-container">
    <div style="position: absolute; top: 0; left: 0; width: 100%; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass-border);">
        <div class="logo-container" style="display: flex; align-items: center; gap: 8px; max-width: 200px; overflow: hidden;">
            <img src="logo.png" alt="UmmahVerse Logo" style="height: 25px; border-radius: 6px; flex-shrink: 0;">
            <div class="logo gold-gradient-text" style="font-size: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">UMMAHVERSE</div>
        </div>
        <a href="dashboard.html" style="color: var(--gold-primary); text-decoration: none; font-size: 14px;">
            <i class="fas fa-arrow-left"></i> <span data-i18n="back_dashboard">Back to Dashboard</span>
        </a>
    </div>

        <div class="dhikr-text" id="active-dhikr" data-i18n="nav_prayer">SubhanAllah</div>

        <div class="counter-circle" id="tap-area">
            <div class="count-val" id="counter">0</div>
            <div class="goal-indicator"><span data-i18n="target">Target</span>: 33</div>
        </div>

        <button class="reset-btn" id="reset-btn" aria-label="Reset Tasbih Counter" data-i18n="reset_session">Reset Session</button>
        
        <div style="margin-top: 40px; display: flex; gap: 20px;">
            <div class="glass-card" style="padding: 10px 20px; cursor: pointer;" onclick="changeDhikr('SubhanAllah')">SubhanAllah</div>
            <div class="glass-card" style="padding: 10px 20px; cursor: pointer;" onclick="changeDhikr('Alhamdulillah')">Alhamdulillah</div>
            <div class="glass-card" style="padding: 10px 20px; cursor: pointer;" onclick="changeDhikr('Allahu Akbar')">Allahu Akbar</div>
        </div>
    </div>

    <script>
        const counterElem = document.getElementById('counter');
        const tapArea = document.getElementById('tap-area');
        const resetBtn = document.getElementById('reset-btn');
        const activeDhikrElem = document.getElementById('active-dhikr');

        let count = parseInt(localStorage.getItem('tasbih_count')) || 0;
        let activeDhikr = localStorage.getItem('tasbih_dhikr') || 'SubhanAllah';

        function init() {
            counterElem.innerText = count;
            activeDhikrElem.innerText = activeDhikr;
        }

        function saveState() {
            localStorage.setItem('tasbih_count', count);
            localStorage.setItem('tasbih_dhikr', activeDhikr);
        }

        function updateCounter() {
            count++;
            counterElem.innerText = count;
            saveState();
            
            // Simulate haptic feedback
            if (window.navigator.vibrate) {
                window.navigator.vibrate(50);
            }

            // Target reached alert
            if (count % 33 === 0) {
                tapArea.style.borderColor = '#10B981';
                setTimeout(() => tapArea.style.borderColor = '', 500);
            }
        }

        function reset() {
            count = 0;
            counterElem.innerText = count;
            saveState();
        }

        function changeDhikr(txt) {
            activeDhikr = txt;
            activeDhikrElem.innerText = activeDhikr;
            reset();
        }

        tapArea.addEventListener('click', updateCounter);
        resetBtn.addEventListener('click', reset);
        init();
        initTranslation();
    </script>

    <!-- Mobile Bottom Navigation -->
    <nav class="mobile-bottom-nav">
        <a href="dashboard.html" class="bottom-nav-item"><i class="fas fa-th-large"></i><span>Home</span></a>
        <a href="quran_reader.html" class="bottom-nav-item"><i class="fas fa-book-open"></i><span>Quran</span></a>
        <a href="tasbih.html" class="bottom-nav-item active"><i class="fas fa-fingerprint"></i><span>Tasbih</span></a>
        <a href="zakat.html" class="bottom-nav-item"><i class="fas fa-hand-holding-heart"></i><span>Zakat</span></a>
        <a href="settings.html" class="bottom-nav-item"><i class="fas fa-cog"></i><span>Settings</span></a>
    </nav>
</body>
</html>
